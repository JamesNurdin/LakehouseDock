instanceName: lakehouse-f

namespace: pgr24james

trino:
  profiler: 
    enabled: false
    when: ['before']
  logger: false
  pod:
    image: 2570809n/trino-node-exporter:latest
  worker:
    resources:
      cpu: "2"
      memory: "16Gi"
    replicasPerNode: 1
    count: 1
    nodes:
      -
  coord:
    resources:
      cpu: "2"
      memory: "16Gi"
    nodeName: ""  # or "" for random

test:
  pod:
    image: macavaney/idabox:py310-v93

metastore:
  nodeName: ""  # or "" for random 
  hive:
    pod:
      image: bde2020/hive:latest
  postgres:
    pod:
      image: postgres:13
    
pvc:
  iceberg:
    name: iceberg-ldbc-snb-1tb
    path: /mnt/iceberg

results:
  raw:
    name: lakehouse-raw-results
    path: /mnt/lakehouse-raw-results